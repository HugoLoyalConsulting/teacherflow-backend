name: Deploy to Development

on:
  push:
    branches: [ dev ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-dev.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build (Development)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_DEV }}
          VITE_ENVIRONMENT: development
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID_DEV }}
          VITE_POSTHOG_ENABLED: false
          VITE_SENTRY_ENABLED: false
          VITE_DEMO_ENABLED: true
          VITE_EMAIL_VERIFICATION_ENABLED: true
          VITE_SUBSCRIPTIONS_ENABLED: true
      
      - name: Deploy to Vercel (Development)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'
          alias-domains: dev.teacherflow-app.vercel.app
      
      - name: Deployment Complete
        run: |
          echo "✅ Development deployment complete"
          echo "🌐 URL: https://dev.teacherflow-app.vercel.app"
