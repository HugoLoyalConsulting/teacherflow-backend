name: Deploy to Production

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Run tests
        if: github.event.inputs.skip_tests != 'true'
        working-directory: frontend
        run: npm run test
      
      - name: Build (Production)
        working-directory: frontend
        run: npm run build
        env:
          # Backend: https://teacherflow-backend-prod.onrender.com
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ENVIRONMENT: production
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_POSTHOG_ENABLED: ${{ secrets.VITE_POSTHOG_ENABLED }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_SENTRY_ENABLED: ${{ secrets.VITE_SENTRY_ENABLED }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_DEMO_ENABLED: true
          VITE_EMAIL_VERIFICATION_ENABLED: true
          VITE_SUBSCRIPTIONS_ENABLED: false
      
      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod --force'  # Force rebuild for cache invalidation
      
      - name: Deployment Complete
        run: |
          echo "✅ Production deployment complete"
          echo "🌐 URL: Auto-assigned by Vercel (check dashboard)"
          echo "📊 Monitor: PostHog & Sentry dashboards"
