name: 🛡️ Automated Database & Code Backup

on:
  # Backup automático diário às 3h AM (UTC)
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 3 1 * *'
  
  # Manual trigger via GitHub Actions UI
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Tipo de backup'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - database-only
          - code-only
      
      retention_days:
        description: 'Dias de retenção'
        required: false
        default: '30'

env:
  BACKUP_RETENTION_DAYS: ${{ github.event.inputs.retention_days || '30' }}

permissions:
  contents: write
  actions: read

jobs:
  backup-database:
    name: 📦 Database Backup (Neon PostgreSQL)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.backup_type != 'code-only' || github.event_name == 'schedule' }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install PostgreSQL client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-15
          pg_dump --version
      
      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy psycopg2-binary
      
      - name: 🗄️ Create database backup (SQL)
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "NEON_DATABASE_URL não configurado em GitHub Secrets"
            exit 1
          fi
          mkdir -p backups/database
          BACKUP_FILE="backups/database/teacherflow_db_$(date +%Y%m%d_%H%M%S).sql"
          
          echo "Creating SQL backup..."
          pg_dump --verbose --format=plain --no-owner --no-acl "$DATABASE_URL" > "$BACKUP_FILE"
          
          echo "Compressing backup..."
          gzip "$BACKUP_FILE"
          
          echo "Backup created: ${BACKUP_FILE}.gz"
          ls -lh backups/database/*.gz
      
      - name: 📊 Create database backup (JSON)
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          python backup_database.py
        continue-on-error: true
      
      - name: 📋 Create backup manifest
        run: |
          cat > backups/database/manifest.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run": "${{ github.run_number }}",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "triggered_by": "${{ github.event_name }}",
            "backups": $(ls -1 backups/database/*.{sql.gz,json.gz,tar.gz} 2>/dev/null | jq -R -s -c 'split("\n")[:-1]' || echo '[]')
          }
          EOF
          
          cat backups/database/manifest.json

      - name: 🧾 Prepare release metadata
        if: github.event_name == 'schedule' && github.event.schedule == '0 3 1 * *'
        id: release_meta
        run: |
          echo "tag=backup-${{ github.run_number }}-$(date +%Y%m)" >> "$GITHUB_OUTPUT"
          echo "title=Monthly Backup - $(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      
      - name: 📤 Upload database backups to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ github.run_number }}
          path: backups/database/
          retention-days: ${{ env.BACKUP_RETENTION_DAYS }}
      
      - name: 🏷️ Create GitHub Release with backup (monthly)
        if: github.event_name == 'schedule' && github.event.schedule == '0 3 1 * *'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.title }}
          body: |
            🛡️ **Automated Monthly Backup**
            
            - **Database:** PostgreSQL (Neon)
            - **Formats:** SQL, JSON, CSV
            - **Timestamp:** $(date -u +%Y-%m-%d %H:%M:%S UTC)
            - **Commit:** ${{ github.sha }}
            
            ⚠️ **Retenção:** Este backup será mantido permanentemente.
            
            📥 **Como restaurar:**
            ```bash
            # Download do backup
            gh release download backup-${{ github.run_number }}-$(date +%Y%m)
            
            # Restaurar banco
            python restore_database.py teacherflow_db_*.sql.gz
            ```
          files: backups/database/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backup-code:
    name: 📁 Code Backup (Full Repository)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.backup_type != 'database-only' || github.event_name == 'schedule' }}
    
    steps:
      - name: 📥 Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Clone history completo
      
      - name: 📦 Create code archive
        run: |
          mkdir -p backups/code
          
          SNAPSHOT_FILE="backups/code/teacherflow_code_snapshot_$(date +%Y%m%d_%H%M%S).tar.gz"
          BUNDLE_FILE="backups/code/teacherflow_code_history_$(date +%Y%m%d_%H%M%S).bundle"
          
          echo "Creating source snapshot backup..."
          git archive --format=tar.gz --prefix=teacherflow/ HEAD > "$SNAPSHOT_FILE"

          echo "Creating full git history bundle backup..."
          git bundle create "$BUNDLE_FILE" --all
          
          echo "Backups created:"
          ls -lh "$SNAPSHOT_FILE" "$BUNDLE_FILE"
      
      - name: 📋 Create git metadata
        run: |
          cat > backups/code/git-metadata.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "tags": $(git tag -l | jq -R -s -c 'split("\n")[:-1]'),
            "remote_url": "${{ github.server_url }}/${{ github.repository }}",
            "total_commits": $(git rev-list --count HEAD),
            "contributors": $(git shortlog -sn --all | head -10 | jq -R -s -c 'split("\n")[:-1]')
          }
          EOF
          
          cat backups/code/git-metadata.json
      
      - name: 📤 Upload code backup to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: code-backup-${{ github.run_number }}
          path: backups/code/
          retention-days: ${{ env.BACKUP_RETENTION_DAYS }}

  backup-env-config:
    name: 🔐 Backup Configuration Templates
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 1 * *'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 📋 Create configuration backup
        run: |
          mkdir -p backups/config
          
          # Backup de arquivos de configuração (sem secrets)
          cp backend/.env.example backups/config/
          cp frontend/.env.example backups/config/
          cp backend/render.yaml backups/config/
          cp frontend/vercel.json backups/config/
          cp backend/alembic.ini backups/config/ 2>/dev/null || true
          
          # Listar routers e models (estrutura da API)
          ls -R backend/app/routers/ > backups/config/api-structure.txt
          ls -R backend/app/models.py > backups/config/db-models.txt
          
          # Package versions
          cp backend/requirements.txt backups/config/
          cp frontend/package.json backups/config/
          
          # Docs
          find . -name "*.md" -not -path "./node_modules/*" -not -path "./.git/*" > backups/config/docs-list.txt
          
          echo "Configuration backup created"
          ls -lh backups/config/
      
      - name: 📤 Upload config backup
        uses: actions/upload-artifact@v4
        with:
          name: config-backup-${{ github.run_number }}
          path: backups/config/
          retention-days: 90

  mirror-to-backup-repos:
    name: 🔄 Mirror to Backup Repositories
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: 📥 Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔄 Push to GitLab backup (if configured)
        if: ${{ secrets.GITLAB_BACKUP_URL != '' }}
        run: |
          git remote add gitlab ${{ secrets.GITLAB_BACKUP_URL }}
          git push gitlab --all --force
          git push gitlab --tags --force
        continue-on-error: true
      
      - name: 🔄 Push to Bitbucket backup (if configured)
        if: ${{ secrets.BITBUCKET_BACKUP_URL != '' }}
        run: |
          git remote add bitbucket ${{ secrets.BITBUCKET_BACKUP_URL }}
          git push bitbucket --all --force
          git push bitbucket --tags --force
        continue-on-error: true

  notify-backup-status:
    name: 📧 Notify Backup Status
    runs-on: ubuntu-latest
    needs: [backup-database, backup-code]
    if: always()
    
    steps:
      - name: ✅ Backup Success Notification
        if: ${{ needs.backup-database.result == 'success' && needs.backup-code.result == 'success' }}
        run: |
          echo "✅ Backup completed successfully!"
          echo "Database: ${{ needs.backup-database.result }}"
          echo "Code: ${{ needs.backup-code.result }}"
      
      - name: ❌ Backup Failure Notification
        if: ${{ needs.backup-database.result == 'failure' || needs.backup-code.result == 'failure' }}
        run: |
          echo "❌ Backup failed!"
          echo "Database: ${{ needs.backup-database.result }}"
          echo "Code: ${{ needs.backup-code.result }}"
          exit 1

  cleanup-old-artifacts:
    name: 🧹 Cleanup Old Backups
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: 🗑️ Delete artifacts older than retention period
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            database-backup-*
            code-backup-*
          failOnError: false
          token: ${{ secrets.GITHUB_TOKEN }}
