name: Deploy Backend to Render

on:
  push:
    branches: [ master, main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Trigger Render Deploy
        if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && secrets.RENDER_DEPLOY_HOOK != ''
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Skip webhook when secret missing
        if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && secrets.RENDER_DEPLOY_HOOK == ''
        run: |
          echo "RENDER_DEPLOY_HOOK not configured."
          echo "If Render auto-deploy is enabled for branch main, this is expected."
        
      - name: Deploy notification
        run: |
          echo "Backend deploy triggered on Render"
          echo "Check status at: https://dashboard.render.com"
