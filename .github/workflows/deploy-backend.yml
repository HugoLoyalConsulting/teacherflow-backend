name: Deploy Backend to Render (API - Free Tier)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: Run tests
        run: |
          cd backend
          pytest --verbose --tb=short || echo "⚠️ Tests not yet implemented"
      
      - name: Security audit (Python dependencies)
        run: |
          cd backend
          pip install pip-audit
          pip-audit --desc || echo "⚠️ Vulnerabilities found, but continuing"

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Trigger Render Deploy via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "🚀 Triggering Render deployment via API..."
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}')
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "Response: $body"
          echo "HTTP Status: $http_code"
          
          # Check if deploy was successful (201 Created)
          if [ "$http_code" = "201" ]; then
            echo "✅ Deploy triggered successfully!"
            deploy_id=$(echo "$body" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "Deploy ID: $deploy_id"
            echo "🔗 Monitor at: https://dashboard.render.com/web/$RENDER_SERVICE_ID"
          else
            echo "❌ Deploy failed!"
            echo "Response body: $body"
            exit 1
          fi
      
      - name: Wait for deployment
        run: |
          echo "⏳ Waiting 30 seconds for Render to start deployment..."
          sleep 30
      
      - name: Verify deployment
        run: |
          echo "🔍 Verifying backend is responding..."
          max_attempts=10
          attempt=1
          
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts..."
            
            if curl -f -s https://teacherflow-backend.onrender.com/health > /dev/null 2>&1; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            
            echo "Backend not ready yet, waiting 15 seconds..."
            sleep 15
            attempt=$((attempt + 1))
          done
          
          echo "⚠️ Backend health check timed out (may still be deploying)"
          echo "🔗 Check status at: https://dashboard.render.com/web/${{ secrets.RENDER_SERVICE_ID }}"

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "🎉 Backend deployed successfully to production!"
            echo "🔗 Backend URL: https://teacherflow-backend.onrender.com"
            echo "🔗 API Docs: https://teacherflow-backend.onrender.com/docs"
          else
            echo "❌ Backend deployment failed!"
            echo "🔗 Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
