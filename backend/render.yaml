services:
  - type: web
    name: teacherflow-backend
    env: python
    region: oregon
    plan: free
    branch: main
    rootDirectory: ./backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: DEBUG
        value: false
      - key: API_V1_STR
        value: /api/v1
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["https://teacherflow-app.vercel.app","http://localhost:5173"]'
      # PostHog Telemetry
      - key: POSTHOG_ENABLED
        value: false
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://app.posthog.com
      # Sentry Error Monitoring
      - key: SENTRY_ENABLED
        value: false
      - key: SENTRY_DSN
        sync: false
