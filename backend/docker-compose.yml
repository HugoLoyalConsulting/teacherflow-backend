version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: teacherflow-db
    environment:
      POSTGRES_USER: ${DB_USER:-teacherflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-teacherflow123}
      POSTGRES_DB: ${DB_NAME:-teacherflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-teacherflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: teacherflow-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-teacherflow}:${DB_PASSWORD:-teacherflow123}@postgres:5432/${DB_NAME:-teacherflow}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app

volumes:
  postgres_data:
